<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Geodetic Calculator</title>
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --bg:       #f7f6f3;
    --surface:  #ffffff;
    --border:   rgba(0,0,0,0.10);
    --border-md:rgba(0,0,0,0.18);
    --text:     #1a1a18;
    --muted:    #6b6a65;
    --hint:     #9b9a95;
    --accent:   #1a7f5a;
    --accent2:  #1a5a8a;
    --danger-bg:#fdf0ee;
    --danger:   #b03020;
    --warn-bg:  #fdf8ee;
    --warn:     #8a6010;
    --ok-bg:    #eef7f2;
    --ok:       #1a6a48;
    --radius:   10px;
    --radius-sm:6px;
    --font: -apple-system, BlinkMacSystemFont, 'Segoe UI', system-ui, sans-serif;
    --mono: 'SF Mono', 'Fira Code', 'Cascadia Code', monospace;
  }

  @media (prefers-color-scheme: dark) {
    :root {
      --bg:       #141412;
      --surface:  #1e1e1c;
      --border:   rgba(255,255,255,0.10);
      --border-md:rgba(255,255,255,0.18);
      --text:     #e8e6df;
      --muted:    #888780;
      --hint:     #5a5956;
      --accent:   #2ec08a;
      --accent2:  #4a9fd4;
      --danger-bg:#2a1410;
      --danger:   #e06050;
      --warn-bg:  #2a2010;
      --warn:     #d4a030;
      --ok-bg:    #102a1c;
      --ok:       #40c080;
    }
  }

  body { font-family: var(--font); background: var(--bg); color: var(--text); min-height: 100vh; }

  header {
    background: var(--surface);
    border-bottom: 1px solid var(--border);
    padding: 1.25rem 1.5rem;
    display: flex;
    align-items: center;
    gap: 12px;
  }
  header svg { flex-shrink: 0; }
  header h1 { font-size: 17px; font-weight: 600; letter-spacing: -0.02em; }
  header p  { font-size: 12px; color: var(--muted); margin-top: 1px; }

  main { max-width: 640px; margin: 0 auto; padding: 1.5rem 1rem 4rem; }

  /* ---- formula tabs ---- */
  .method-row { display: flex; gap: 8px; margin-bottom: 14px; }
  .method-btn {
    flex: 1; padding: 9px 12px; font-family: var(--font); font-size: 13px; font-weight: 500;
    border-radius: var(--radius-sm); border: 1px solid var(--border-md);
    background: var(--bg); color: var(--muted); cursor: pointer; text-align: center; transition: all 0.15s;
  }
  .method-btn.active { background: var(--surface); border-color: var(--accent); color: var(--text); }

  /* ---- shared-pin banner (only shown when handed off via Maps share sheet) ---- */
  .pin-banner {
    display: none;
    background: var(--ok-bg); border: 1px solid var(--ok);
    border-radius: var(--radius); padding: 0.9rem 1rem; margin-bottom: 14px;
  }
  .pin-banner.show { display: flex; flex-direction: column; gap: 10px; }
  .pin-banner-text { display: flex; flex-direction: column; gap: 2px; }
  .pin-banner-text strong { font-size: 13px; color: var(--ok); }
  .pin-banner-text span { font-size: 12px; font-family: var(--mono); color: var(--muted); }
  .pin-banner-actions { display: flex; gap: 8px; }
  .pin-use-btn {
    flex: 1; padding: 7px 10px; font-family: var(--font); font-size: 12px; font-weight: 600;
    border-radius: var(--radius-sm); border: 1px solid var(--ok); background: var(--surface);
    color: var(--ok); cursor: pointer; transition: opacity 0.15s;
  }
  .pin-use-btn:active { opacity: 0.8; }

  /* ---- point cards ---- */
  .card {
    background: var(--surface); border: 1px solid var(--border);
    border-radius: var(--radius); padding: 1.1rem 1.25rem; margin-bottom: 12px;
  }
  .card-header {
    display: flex; align-items: center; justify-content: space-between; margin-bottom: 12px;
  }
  .card-label {
    font-size: 11px; font-weight: 600; letter-spacing: 0.08em;
    text-transform: uppercase; color: var(--muted);
    display: flex; align-items: center; gap: 6px;
  }

  /* GPS button */
  .gps-btn {
    display: flex; align-items: center; gap: 5px;
    padding: 5px 10px; font-family: var(--font); font-size: 12px; font-weight: 500;
    border-radius: 20px; border: 1px solid var(--border-md);
    background: var(--bg); color: var(--muted); cursor: pointer; transition: all 0.15s;
    white-space: nowrap;
  }
  .gps-btn:hover { border-color: var(--accent); color: var(--accent); }
  .gps-btn.loading { opacity: 0.6; pointer-events: none; }
  .gps-btn svg { width: 13px; height: 13px; flex-shrink: 0; }

  /* coordinate fields */
  .field-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; margin-bottom: 10px; }
  .field label { display: block; font-size: 11px; color: var(--muted); margin-bottom: 5px; font-weight: 500; }
  .field input {
    width: 100%; font-family: var(--mono); font-size: 15px; padding: 9px 11px;
    border: 1px solid var(--border-md); border-radius: var(--radius-sm);
    background: var(--bg); color: var(--text);
    appearance: none; -webkit-appearance: none; outline: none; transition: border-color 0.15s;
  }
  .field input:focus { border-color: var(--accent); }
  .field input::placeholder { color: var(--hint); }

  /* paste field */
  .paste-wrap { position: relative; }
  .paste-label { font-size: 11px; color: var(--muted); margin-bottom: 5px; font-weight: 500; }
  .paste-input {
    width: 100%; font-family: var(--mono); font-size: 13px; padding: 9px 11px;
    border: 1px solid var(--border-md); border-radius: var(--radius-sm);
    background: var(--bg); color: var(--text); outline: none; transition: border-color 0.15s;
    appearance: none; -webkit-appearance: none;
  }
  .paste-input:focus { border-color: var(--accent2); }
  .paste-input::placeholder { color: var(--hint); font-size: 12px; }
  .paste-hint { font-size: 11px; color: var(--hint); margin-top: 4px; line-height: 1.4; }

  /* gps status pill */
  .gps-status {
    font-size: 11px; padding: 4px 10px; border-radius: 20px;
    margin-top: 8px; display: none;
  }
  .gps-status.ok   { display: block; background: var(--ok-bg);   color: var(--ok);   }
  .gps-status.warn { display: block; background: var(--warn-bg); color: var(--warn); }

  /* divider */
  .or-divider {
    display: flex; align-items: center; gap: 8px; margin: 10px 0;
    font-size: 11px; color: var(--hint);
  }
  .or-divider::before, .or-divider::after {
    content: ''; flex: 1; height: 1px; background: var(--border);
  }

  /* calculate button */
  .calc-btn {
    width: 100%; padding: 13px; font-family: var(--font); font-size: 15px; font-weight: 600;
    border-radius: var(--radius); border: none; background: var(--accent); color: #fff;
    cursor: pointer; letter-spacing: -0.01em; transition: opacity 0.15s, transform 0.1s;
    margin-bottom: 16px;
  }
  .calc-btn:active { opacity: 0.85; transform: scale(0.99); }

  .error {
    background: var(--danger-bg); color: var(--danger); border-radius: var(--radius-sm);
    padding: 10px 14px; font-size: 13px; margin-bottom: 12px; display: none; line-height: 1.5;
  }
  .error.show { display: block; }

  /* results */
  .results { display: none; }
  .results.show { display: block; }

  .section-label {
    font-size: 11px; font-weight: 600; letter-spacing: 0.08em;
    text-transform: uppercase; color: var(--muted); margin: 20px 0 8px;
  }

  .dist-table { background: var(--surface); border: 1px solid var(--border); border-radius: var(--radius); overflow: hidden; }
  .dist-row { display: flex; justify-content: space-between; align-items: center; padding: 10px 14px; border-bottom: 1px solid var(--border); font-size: 14px; }
  .dist-row:last-child { border-bottom: none; }
  .dist-row .dl { color: var(--muted); }
  .dist-row .dv { font-family: var(--mono); font-size: 13px; font-weight: 500; }

  .bearing-card { background: var(--surface); border: 1px solid var(--border); border-radius: var(--radius); overflow: hidden; margin-bottom: 16px; }
  .bearing-row { display: flex; justify-content: space-between; align-items: center; padding: 12px 14px; border-bottom: 1px solid var(--border); }
  .bearing-row:last-child { border-bottom: none; }
  .bearing-row .bl { font-size: 13px; color: var(--muted); }
  .bearing-row .bdms { font-size: 11px; color: var(--hint); margin-top: 2px; font-family: var(--mono); }
  .bearing-row .bright { text-align: right; display: flex; align-items: center; gap: 8px; }
  .bearing-row .bval { font-family: var(--mono); font-size: 18px; font-weight: 600; }

  .badge { font-size: 11px; font-weight: 600; padding: 3px 7px; border-radius: 20px; letter-spacing: 0.04em; }
  .badge-fwd { background: rgba(26,127,90,0.12); color: var(--accent); }
  .badge-rev { background: rgba(26,90,138,0.12); color: var(--accent2); }

  .compass-wrap { display: flex; justify-content: center; padding: 1.5rem 0 0.5rem; }
  .method-note { font-size: 11px; color: var(--hint); text-align: center; margin-top: 8px; font-family: var(--mono); }

  @media (min-width: 480px) {
    main { padding: 2rem 1.5rem 4rem; }
    header { padding: 1.5rem 2rem; }
  }
</style>
</head>
<body>

<header>
  <svg width="28" height="28" viewBox="0 0 28 28" fill="none" xmlns="http://www.w3.org/2000/svg">
    <circle cx="14" cy="14" r="12" stroke="currentColor" stroke-width="1.2" opacity="0.3"/>
    <ellipse cx="14" cy="14" rx="6" ry="12" stroke="currentColor" stroke-width="1.2" opacity="0.5"/>
    <line x1="2" y1="14" x2="26" y2="14" stroke="currentColor" stroke-width="1.2" opacity="0.5"/>
    <circle cx="14" cy="7" r="2.5" fill="currentColor" opacity="0.8"/>
    <circle cx="20" cy="18" r="2.5" fill="currentColor" opacity="0.4"/>
    <line x1="14" y1="7" x2="20" y2="18" stroke="currentColor" stroke-width="1.5" stroke-linecap="round"/>
  </svg>
  <div>
    <h1>Geodetic Calculator</h1>
    <p>Distance &amp; bearing · WGS-84 ellipsoid</p>
  </div>
</header>

<main>

  <div class="method-row">
    <button class="method-btn active" id="tab-vincenty" onclick="setMethod('vincenty')">Vincenty (1975)</button>
    <button class="method-btn" id="tab-karney" onclick="setMethod('karney')">Karney (2013)</button>
  </div>

  <div class="pin-banner" id="pin-banner">
    <div class="pin-banner-text">
      <strong id="pin-banner-title">Shared location received</strong>
      <span id="pin-banner-coords"></span>
    </div>
    <div class="pin-banner-actions">
      <button class="pin-use-btn" onclick="useSharedPin(1)">Set as Point 1</button>
      <button class="pin-use-btn" onclick="useSharedPin(2)">Set as Point 2</button>
    </div>
  </div>

  <!-- Point 1 -->
  <div class="card">
    <div class="card-header">
      <div class="card-label">
        <svg width="13" height="13" viewBox="0 0 16 16" fill="currentColor"><path d="M8 0C5.24 0 3 2.24 3 5c0 3.75 5 11 5 11s5-7.25 5-11c0-2.76-2.24-5-5-5zm0 7.5A2.5 2.5 0 1 1 8 2.5a2.5 2.5 0 0 1 0 5z"/></svg>
        Point 1
      </div>
      <button class="gps-btn" id="gps1-btn" onclick="useMyLocation(1)">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
          <circle cx="12" cy="12" r="3"/><path d="M12 2v3M12 19v3M2 12h3M19 12h3"/>
          <path d="M12 8a4 4 0 1 0 0 8 4 4 0 0 0 0-8z" opacity="0"/>
        </svg>
        Use my location
      </button>
    </div>
    <div class="field-grid">
      <div class="field">
        <label>Latitude (°)</label>
        <input id="lat1" type="text" inputmode="decimal" autocomplete="off" autocorrect="off" autocapitalize="off" spellcheck="false" placeholder="e.g. 51.5074">
      </div>
      <div class="field">
        <label>Longitude (°)</label>
        <input id="lon1" type="text" inputmode="decimal" autocomplete="off" autocorrect="off" autocapitalize="off" spellcheck="false" placeholder="e.g. -0.1278">
      </div>
    </div>
    <div id="gps1-status" class="gps-status"></div>
    <div class="or-divider">or paste</div>
    <div class="paste-label">Paste coordinates or Maps link</div>
    <input class="paste-input" id="paste1" type="text"
      placeholder="51.5074, -0.1278  or  51°30′N 0°7′W  or  google.com/maps?q=…"
      oninput="handlePaste(1, this.value)">
    <div class="paste-hint" id="paste1-hint"></div>
  </div>

  <!-- Point 2 -->
  <div class="card">
    <div class="card-header">
      <div class="card-label">
        <svg width="13" height="13" viewBox="0 0 16 16" fill="currentColor"><path d="M8 0C5.24 0 3 2.24 3 5c0 3.75 5 11 5 11s5-7.25 5-11c0-2.76-2.24-5-5-5zm0 7.5A2.5 2.5 0 1 1 8 2.5a2.5 2.5 0 0 1 0 5z"/></svg>
        Point 2
      </div>
      <button class="gps-btn" id="gps2-btn" onclick="useMyLocation(2)">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
          <circle cx="12" cy="12" r="3"/><path d="M12 2v3M12 19v3M2 12h3M19 12h3"/>
        </svg>
        Use my location
      </button>
    </div>
    <div class="field-grid">
      <div class="field">
        <label>Latitude (°)</label>
        <input id="lat2" type="text" inputmode="decimal" autocomplete="off" autocorrect="off" autocapitalize="off" spellcheck="false" placeholder="e.g. 40.7128">
      </div>
      <div class="field">
        <label>Longitude (°)</label>
        <input id="lon2" type="text" inputmode="decimal" autocomplete="off" autocorrect="off" autocapitalize="off" spellcheck="false" placeholder="e.g. -74.0060">
      </div>
    </div>
    <div id="gps2-status" class="gps-status"></div>
    <div class="or-divider">or paste</div>
    <div class="paste-label">Paste coordinates or Maps link</div>
    <input class="paste-input" id="paste2" type="text"
      placeholder="40.7128, -74.0060  or  40°42′N 74°0′W  or  google.com/maps?q=…"
      oninput="handlePaste(2, this.value)">
    <div class="paste-hint" id="paste2-hint"></div>
  </div>

  <button class="calc-btn" onclick="calculate()">Calculate</button>

  <div class="error" id="error-msg"></div>

  <div class="results" id="results">
    <div class="section-label">Distance</div>
    <div class="dist-table">
      <div class="dist-row"><span class="dl">Metres</span><span class="dv" id="r-m"></span></div>
      <div class="dist-row"><span class="dl">Kilometres</span><span class="dv" id="r-km"></span></div>
      <div class="dist-row"><span class="dl">Miles</span><span class="dv" id="r-mi"></span></div>
      <div class="dist-row"><span class="dl">Nautical miles</span><span class="dv" id="r-nm"></span></div>
    </div>

    <div class="section-label">Bearings — true north</div>
    <div class="bearing-card">
      <div class="bearing-row">
        <div>
          <div class="bl">Forward &nbsp;(1 → 2)</div>
          <div class="bdms" id="r-fwd-dms"></div>
        </div>
        <div class="bright">
          <span class="badge badge-fwd" id="r-fwd-compass"></span>
          <span class="bval" id="r-fwd-deg"></span>
        </div>
      </div>
      <div class="bearing-row">
        <div>
          <div class="bl">Reverse &nbsp;(2 → 1)</div>
          <div class="bdms" id="r-rev-dms"></div>
        </div>
        <div class="bright">
          <span class="badge badge-rev" id="r-rev-compass"></span>
          <span class="bval" id="r-rev-deg"></span>
        </div>
      </div>
    </div>

    <div class="compass-wrap">
      <canvas id="compass" width="220" height="220"></canvas>
    </div>
    <p class="method-note" id="method-note"></p>
  </div>
</main>

<script>
/* =====================================================================
   WGS-84 constants
===================================================================== */
const WGS84_A = 6378137.0;
const WGS84_F = 1 / 298.257223563;
const WGS84_B = WGS84_A * (1 - WGS84_F);

let currentMethod = 'vincenty';

/* =====================================================================
   Handoff data — from Apple Shortcuts (or any external caller)
   URL params:
     device_lat, device_lon   — current device location, captured natively
     pin_lat,    pin_lon      — a Maps pin shared in via Share Sheet (optional)
   Neither pre-fills any field. They're only used when the user taps
   "Use my location" or a future "Use shared pin" control.
===================================================================== */
const handoff = (() => {
  const p = new URLSearchParams(window.location.search);
  const num = key => {
    const v = p.get(key);
    if (v === null) return null;
    const n = parseFloat(v);
    return isNaN(n) ? null : n;
  };
  return {
    deviceLat: num('device_lat'),
    deviceLon: num('device_lon'),
    pinLat:    num('pin_lat'),
    pinLon:    num('pin_lon'),
    pinLabel:  p.get('pin_label') || null,
  };
})();

function setMethod(m) {
  currentMethod = m;
  document.getElementById('tab-vincenty').classList.toggle('active', m === 'vincenty');
  document.getElementById('tab-karney').classList.toggle('active', m === 'karney');
}

const toRad = d => d * Math.PI / 180;
const toDeg = r => r * 180 / Math.PI;

/* =====================================================================
   Vincenty inverse
===================================================================== */
function vincenty(lat1, lon1, lat2, lon2) {
  const a = WGS84_A, b = WGS84_B, f = WGS84_F;
  const φ1 = toRad(lat1), φ2 = toRad(lat2);
  const L = toRad(lon2 - lon1);
  const U1 = Math.atan((1 - f) * Math.tan(φ1));
  const U2 = Math.atan((1 - f) * Math.tan(φ2));
  const sinU1 = Math.sin(U1), cosU1 = Math.cos(U1);
  const sinU2 = Math.sin(U2), cosU2 = Math.cos(U2);
  let λ = L, λPrev, iter = 0;
  let sinσ, cosσ, σ, sinα, cosSqα, cos2σm, C;
  do {
    const sinλ = Math.sin(λ), cosλ = Math.cos(λ);
    sinσ = Math.sqrt(Math.pow(cosU2*sinλ,2) + Math.pow(cosU1*sinU2 - sinU1*cosU2*cosλ,2));
    if (sinσ === 0) return { distance:0, fwd:0, rev:0, iterations:0 };
    cosσ = sinU1*sinU2 + cosU1*cosU2*cosλ;
    σ = Math.atan2(sinσ, cosσ);
    sinα = cosU1*cosU2*sinλ / sinσ;
    cosSqα = 1 - sinα*sinα;
    cos2σm = cosSqα === 0 ? 0 : cosσ - 2*sinU1*sinU2/cosSqα;
    C = f/16 * cosSqα * (4 + f*(4 - 3*cosSqα));
    λPrev = λ;
    λ = L + (1-C)*f*sinα*(σ + C*sinσ*(cos2σm + C*cosσ*(-1 + 2*cos2σm*cos2σm)));
    iter++;
  } while (Math.abs(λ - λPrev) > 1e-12 && iter < 200);
  if (iter >= 200) return { error: 'Vincenty did not converge — likely near-antipodal points. Try Karney.' };
  const uSq = cosSqα*(a*a - b*b)/(b*b);
  const A2 = 1 + uSq/16384*(4096 + uSq*(-768 + uSq*(320 - 175*uSq)));
  const B2 = uSq/1024*(256 + uSq*(-128 + uSq*(74 - 47*uSq)));
  const Δσ = B2*sinσ*(cos2σm + B2/4*(cosσ*(-1+2*cos2σm*cos2σm) - B2/6*cos2σm*(-3+4*sinσ*sinσ)*(-3+4*cos2σm*cos2σm)));
  const dist = b*A2*(σ - Δσ);
  const sinλf = Math.sin(λ), cosλf = Math.cos(λ);
  const fwd = (toDeg(Math.atan2(cosU2*sinλf, cosU1*sinU2 - sinU1*cosU2*cosλf)) + 360) % 360;
  const rev = (toDeg(Math.atan2(cosU1*sinλf, -sinU1*cosU2 + cosU1*sinU2*cosλf)) + 360) % 360;
  return { distance: dist, fwd, rev, iterations: iter };
}

/* =====================================================================
   Karney inverse
===================================================================== */
function karney(lat1, lon1, lat2, lon2) {
  const a = WGS84_A, f = WGS84_F, b = WGS84_B;
  const φ1 = toRad(lat1), φ2 = toRad(lat2);
  const L = toRad(lon2 - lon1);
  const β1 = Math.atan2((1-f)*Math.sin(φ1), Math.cos(φ1));
  const β2 = Math.atan2((1-f)*Math.sin(φ2), Math.cos(φ2));
  const sinβ1 = Math.sin(β1), cosβ1 = Math.cos(β1);
  const sinβ2 = Math.sin(β2), cosβ2 = Math.cos(β2);
  let ω12 = L;
  let α1 = Math.atan2(cosβ2*Math.sin(ω12), cosβ1*sinβ2 - sinβ1*cosβ2*Math.cos(ω12));
  for (let i = 0; i < 20; i++) {
    const sinα1 = Math.sin(α1), cosα1 = Math.cos(α1);
    const sinα0 = sinα1*cosβ1;
    const cosSqα0 = 1 - sinα0*sinα0;
    const k2 = (a*a - b*b)/(b*b)*cosSqα0;
    const sqrtk2 = Math.sqrt(1 + k2);
    const ε = (sqrtk2 - 1)/(sqrtk2 + 1);
    const ε2 = ε*ε;
    const A1 = 1/(1-ε)*(1 + ε2/4*(1 + ε2/4*(1 + ε2/4)));
    const C1a = -ε/2 + 3*ε2/16, C1b = -ε2/16;
    const I1 = s => A1*(s + C1a*Math.sin(2*s) + C1b*Math.sin(4*s));
    const σ1 = Math.atan2(sinβ1, cosα1*cosβ1);
    const sinσ12 = Math.sqrt(Math.pow(cosβ1*sinβ2 - sinβ1*cosβ2*Math.cos(ω12),2) + Math.pow(cosβ2*Math.sin(ω12),2));
    const cosσ12 = sinβ1*sinβ2 + cosβ1*cosβ2*Math.cos(ω12);
    const σ12 = Math.atan2(sinσ12, cosσ12);
    const dist = b*(I1(σ1 + σ12) - I1(σ1));
    const J12 = σ12 + C1a*(Math.sin(2*(σ1+σ12)) - Math.sin(2*σ1)) + C1b*(Math.sin(4*(σ1+σ12)) - Math.sin(4*σ1));
    const λ12 = ω12 - f*sinα0*J12;
    const diff = λ12 - L;
    if (Math.abs(diff) < 1e-13) {
      const sinα2 = sinα0/cosβ2;
      const cosα2 = Math.sqrt(Math.max(0, 1 - sinα2*sinα2));
      return { distance: dist, fwd: (toDeg(α1)+360)%360, rev: (toDeg(Math.atan2(sinα2,-cosα2))+360)%360 };
    }
    α1 -= diff*0.7;
  }
  return vincenty(lat1, lon1, lat2, lon2);
}

/* =====================================================================
   GPS / device location
===================================================================== */
function useMyLocation(point) {
  const btn    = document.getElementById(`gps${point}-btn`);
  const status = document.getElementById(`gps${point}-status`);

  // Browser Geolocation unavailable (e.g. offline file:// page) — fall back
  // to the device location captured natively by the Shortcut, if present.
  if (!navigator.geolocation) {
    if (handoff.deviceLat !== null && handoff.deviceLon !== null) {
      fillFromHandoff(point, status);
    } else {
      showStatus(status, 'Location unavailable in this browser context and no device location was supplied.', 'warn');
    }
    return;
  }

  btn.classList.add('loading');
  btn.textContent = 'Locating…';
  status.className = 'gps-status';

  navigator.geolocation.getCurrentPosition(
    pos => {
      const lat = pos.coords.latitude;
      const lon = pos.coords.longitude;
      const acc = pos.coords.accuracy;
      document.getElementById(`lat${point}`).value = lat.toFixed(7);
      document.getElementById(`lon${point}`).value = lon.toFixed(7);
      document.getElementById(`paste${point}`).value = '';
      document.getElementById(`paste${point}-hint`).textContent = '';
      showStatus(status, `Location set · accuracy ±${Math.round(acc)} m`, 'ok');
      resetGpsBtn(btn, point);
    },
    err => {
      // Browser GPS failed — fall back to Shortcut-supplied device location if we have it.
      if (handoff.deviceLat !== null && handoff.deviceLon !== null) {
        fillFromHandoff(point, status);
        resetGpsBtn(btn, point);
        return;
      }
      const msgs = {
        1: 'Location access denied. Allow location in browser/system settings.',
        2: 'Location unavailable. Try again or enter coordinates manually.',
        3: 'Location request timed out. Try again.'
      };
      showStatus(status, msgs[err.code] || 'Location error.', 'warn');
      resetGpsBtn(btn, point);
    },
    { enableHighAccuracy: true, timeout: 12000, maximumAge: 0 }
  );
}

function fillFromHandoff(point, status) {
  document.getElementById(`lat${point}`).value = handoff.deviceLat.toFixed(7);
  document.getElementById(`lon${point}`).value = handoff.deviceLon.toFixed(7);
  document.getElementById(`paste${point}`).value = '';
  document.getElementById(`paste${point}-hint`).textContent = '';
  showStatus(status, 'Location set from device (via Shortcut)', 'ok');
}

/* =====================================================================
   Shared Maps pin (handed off via Shortcuts + Share Sheet) — optional.
   The app works fully standalone; this banner only appears if pin
   coordinates were actually included in the URL.
===================================================================== */
function useSharedPin(point) {
  if (handoff.pinLat === null || handoff.pinLon === null) return;
  document.getElementById(`lat${point}`).value = handoff.pinLat.toFixed(7);
  document.getElementById(`lon${point}`).value = handoff.pinLon.toFixed(7);
  document.getElementById(`paste${point}`).value = '';
  document.getElementById(`paste${point}-hint`).textContent = '';
  const status = document.getElementById(`gps${point}-status`);
  showStatus(status, handoff.pinLabel ? `Set from shared pin: ${handoff.pinLabel}` : 'Set from shared pin', 'ok');
}

function initPinBanner() {
  if (handoff.pinLat === null || handoff.pinLon === null) return;
  const banner = document.getElementById('pin-banner');
  const coordsEl = document.getElementById('pin-banner-coords');
  const titleEl = document.getElementById('pin-banner-title');
  if (handoff.pinLabel) titleEl.textContent = `Shared location: ${handoff.pinLabel}`;
  coordsEl.textContent = `${handoff.pinLat.toFixed(6)}, ${handoff.pinLon.toFixed(6)}`;
  banner.classList.add('show');
}

function resetGpsBtn(btn, point) {
  btn.classList.remove('loading');
  btn.innerHTML = `<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" style="width:13px;height:13px;flex-shrink:0"><circle cx="12" cy="12" r="3"/><path d="M12 2v3M12 19v3M2 12h3M19 12h3"/></svg>Use my location`;
}

function showStatus(el, msg, type) {
  el.textContent = msg;
  el.className = 'gps-status ' + type;
}

/* =====================================================================
   Paste / smart coordinate parser
===================================================================== */
function handlePaste(point, raw) {
  const hintEl = document.getElementById(`paste${point}-hint`);
  const result = parseCoords(raw.trim());
  if (!result) {
    hintEl.style.color = 'var(--hint)';
    hintEl.textContent = raw.length > 4 ? 'Format not recognised — keep typing or try a different format.' : '';
    return;
  }
  document.getElementById(`lat${point}`).value = result.lat.toFixed(7);
  document.getElementById(`lon${point}`).value = result.lon.toFixed(7);
  hintEl.style.color = 'var(--ok)';
  hintEl.textContent = `Parsed: ${result.lat.toFixed(6)}, ${result.lon.toFixed(6)}`;
}

function parseCoords(s) {
  if (!s) return null;

  /* 1. Google Maps URL  @lat,lon,zoom or ?q=lat,lon */
  let m = s.match(/@(-?\d+\.?\d*),(-?\d+\.?\d*)/);
  if (m) return validate(+m[1], +m[2]);
  m = s.match(/[?&]q=(-?\d+\.?\d*),(-?\d+\.?\d*)/i);
  if (m) return validate(+m[1], +m[2]);

  /* 2. Any URL containing /lat,lon/ patterns */
  m = s.match(/\/(-?\d{1,3}\.\d+),(-?\d{1,3}\.\d+)/);
  if (m) return validate(+m[1], +m[2]);

  /* 3. Decimal degrees  "51.5074, -0.1278" or "51.5074 -0.1278" */
  m = s.match(/^(-?\d{1,3}\.?\d*)[,\s]+(-?\d{1,3}\.?\d*)$/);
  if (m) return validate(+m[1], +m[2]);

  /* 4. DMS with hemisphere letters  51°30'26"N 0°7'39"W  or  51 30 26 N 0 7 39 W */
  m = s.match(/(\d{1,3})[°\s](\d{1,2})['\s](\d{1,2}(?:\.\d+)?)["\s]*([NS])[,\s]+(\d{1,3})[°\s](\d{1,2})['\s](\d{1,2}(?:\.\d+)?)["\s]*([EW])/i);
  if (m) {
    let lat = +m[1] + +m[2]/60 + +m[3]/3600;
    let lon = +m[5] + +m[6]/60 + +m[7]/3600;
    if (m[4].toUpperCase() === 'S') lat = -lat;
    if (m[8].toUpperCase() === 'W') lon = -lon;
    return validate(lat, lon);
  }

  /* 5. DM with hemisphere  51°30.44'N 0°7.65'W */
  m = s.match(/(\d{1,3})[°\s](\d{1,2}\.?\d*)['\s]*([NS])[,\s]+(\d{1,3})[°\s](\d{1,2}\.?\d*)['\s]*([EW])/i);
  if (m) {
    let lat = +m[1] + +m[2]/60;
    let lon = +m[4] + +m[5]/60;
    if (m[3].toUpperCase() === 'S') lat = -lat;
    if (m[6].toUpperCase() === 'W') lon = -lon;
    return validate(lat, lon);
  }

  /* 6. Signed decimal with degree symbol  51.5074° -0.1278° */
  m = s.match(/(-?\d{1,3}\.?\d*)[°\s]+(-?\d{1,3}\.?\d*)°?/);
  if (m) return validate(+m[1], +m[2]);

  return null;
}

function validate(lat, lon) {
  if (isNaN(lat) || isNaN(lon)) return null;
  if (lat < -90 || lat > 90)   return null;
  if (lon < -180 || lon > 180) return null;
  return { lat, lon };
}

/* =====================================================================
   Calculate
===================================================================== */
function compassLabel(d) {
  return ['N','NNE','NE','ENE','E','ESE','SE','SSE','S','SSW','SW','WSW','W','WNW','NW','NNW'][Math.round(d/22.5)%16];
}

function toDMS(d) {
  const deg = Math.floor(d);
  const mf  = (d - deg)*60;
  const min = Math.floor(mf);
  const sec = ((mf - min)*60).toFixed(2);
  return `${deg}° ${min}' ${sec}"`;
}

function fmt(n, dec) {
  return n.toLocaleString('en', { minimumFractionDigits: dec, maximumFractionDigits: dec });
}

function calculate() {
  const lat1 = parseFloat(document.getElementById('lat1').value.trim());
  const lon1 = parseFloat(document.getElementById('lon1').value.trim());
  const lat2 = parseFloat(document.getElementById('lat2').value.trim());
  const lon2 = parseFloat(document.getElementById('lon2').value.trim());
  const errEl = document.getElementById('error-msg');
  const resEl = document.getElementById('results');
  errEl.classList.remove('show');

  if ([lat1,lon1,lat2,lon2].some(isNaN)) {
    errEl.textContent = 'Enter or paste coordinates for both points before calculating.';
    errEl.classList.add('show'); resEl.classList.remove('show'); return;
  }
  if (lat1 < -90 || lat1 > 90 || lat2 < -90 || lat2 > 90) {
    errEl.textContent = 'Latitude must be between −90 and 90.';
    errEl.classList.add('show'); resEl.classList.remove('show'); return;
  }
  if (lon1 < -180 || lon1 > 180 || lon2 < -180 || lon2 > 180) {
    errEl.textContent = 'Longitude must be between −180 and 180.';
    errEl.classList.add('show'); resEl.classList.remove('show'); return;
  }

  const result = currentMethod === 'vincenty'
    ? vincenty(lat1, lon1, lat2, lon2)
    : karney(lat1, lon1, lat2, lon2);

  if (result.error) {
    errEl.textContent = result.error;
    errEl.classList.add('show'); resEl.classList.remove('show'); return;
  }

  const { distance: d, fwd, rev } = result;

  document.getElementById('r-m').textContent  = fmt(d, 3) + ' m';
  document.getElementById('r-km').textContent = fmt(d/1000, 6) + ' km';
  document.getElementById('r-mi').textContent = fmt(d/1609.344, 6) + ' mi';
  document.getElementById('r-nm').textContent = fmt(d/1852, 6) + ' NM';

  document.getElementById('r-fwd-deg').textContent     = fwd.toFixed(1) + '°';
  document.getElementById('r-fwd-compass').textContent = compassLabel(fwd);
  document.getElementById('r-fwd-dms').textContent     = toDMS(fwd);
  document.getElementById('r-rev-deg').textContent     = rev.toFixed(1) + '°';
  document.getElementById('r-rev-compass').textContent = compassLabel(rev);
  document.getElementById('r-rev-dms').textContent     = toDMS(rev);

  document.getElementById('method-note').textContent = currentMethod === 'vincenty'
    ? `Vincenty 1975 · WGS-84 · ${result.iterations} iterations · ±0.5 mm accuracy`
    : `Karney 2013 · WGS-84 · ±15 nm accuracy`;

  drawCompass(fwd, rev);
  resEl.classList.add('show');
}

/* =====================================================================
   Compass rose (Canvas)
===================================================================== */
function drawCompass(fwd, rev) {
  const canvas = document.getElementById('compass');
  const ctx = canvas.getContext('2d');
  const dpr = window.devicePixelRatio || 1;
  const size = 220;
  canvas.width  = size*dpr; canvas.height = size*dpr;
  canvas.style.width = size+'px'; canvas.style.height = size+'px';
  ctx.scale(dpr, dpr);

  const dark     = window.matchMedia('(prefers-color-scheme: dark)').matches;
  const cx = size/2, cy = size/2, r = 96;
  const colBg     = dark ? '#1e1e1c' : '#ffffff';
  const colRing   = dark ? 'rgba(255,255,255,0.12)' : 'rgba(0,0,0,0.12)';
  const colTick   = dark ? 'rgba(255,255,255,0.15)' : 'rgba(0,0,0,0.12)';
  const colText   = dark ? '#888780' : '#888780';
  const colCenter = dark ? '#e8e6df' : '#1a1a18';
  const colFwd    = dark ? '#2ec08a' : '#1a7f5a';
  const colRev    = dark ? '#4a9fd4' : '#1a5a8a';

  ctx.clearRect(0, 0, size, size);
  ctx.beginPath(); ctx.arc(cx,cy,r,0,Math.PI*2);
  ctx.fillStyle = colBg; ctx.fill();
  ctx.strokeStyle = colRing; ctx.lineWidth = 1; ctx.stroke();

  for (let i = 0; i < 72; i++) {
    if (i%18 === 0) continue;
    const ang = toRad(i*5) - Math.PI/2;
    const len = i%2 === 0 ? 8 : 5;
    ctx.beginPath();
    ctx.moveTo(cx+(r-4)*Math.cos(ang), cy+(r-4)*Math.sin(ang));
    ctx.lineTo(cx+(r-4-len)*Math.cos(ang), cy+(r-4-len)*Math.sin(ang));
    ctx.strokeStyle = colTick; ctx.lineWidth = 0.5; ctx.stroke();
  }

  [['N',0],['E',90],['S',180],['W',270]].forEach(([lbl,deg]) => {
    const ang = toRad(deg) - Math.PI/2;
    ctx.font = '500 12px ' + getComputedStyle(document.body).fontFamily;
    ctx.fillStyle = colText; ctx.textAlign = 'center'; ctx.textBaseline = 'middle';
    ctx.fillText(lbl, cx+(r-16)*Math.cos(ang), cy+(r-16)*Math.sin(ang));
  });

  function drawArrow(bearing, color) {
    const ang = toRad(bearing) - Math.PI/2;
    const len = r - 22;
    const x2 = cx+len*Math.cos(ang), y2 = cy+len*Math.sin(ang);
    const x1 = cx-18*Math.cos(ang),  y1 = cy-18*Math.sin(ang);
    ctx.beginPath(); ctx.moveTo(x1,y1); ctx.lineTo(x2,y2);
    ctx.strokeStyle = color; ctx.lineWidth = 2.5; ctx.lineCap = 'round'; ctx.stroke();
    const hL = 10, hA = 0.42;
    ctx.beginPath();
    ctx.moveTo(x2,y2); ctx.lineTo(x2-hL*Math.cos(ang-hA), y2-hL*Math.sin(ang-hA));
    ctx.moveTo(x2,y2); ctx.lineTo(x2-hL*Math.cos(ang+hA), y2-hL*Math.sin(ang+hA));
    ctx.strokeStyle = color; ctx.lineWidth = 2.5; ctx.stroke();
  }

  drawArrow(rev, colRev);
  drawArrow(fwd, colFwd);

  ctx.beginPath(); ctx.arc(cx,cy,5,0,Math.PI*2);
  ctx.fillStyle = colCenter; ctx.fill();

  const ly = size - 14;
  ctx.font = '11px '+getComputedStyle(document.body).fontFamily;
  ctx.textBaseline = 'middle';
  ctx.fillStyle = colFwd; ctx.fillRect(18, ly-5, 18, 3);
  ctx.fillStyle = colText; ctx.textAlign = 'left';
  ctx.fillText(`Fwd ${fwd.toFixed(1)}°`, 42, ly);
  ctx.fillStyle = colRev; ctx.fillRect(size/2+4, ly-5, 18, 3);
  ctx.fillStyle = colText;
  ctx.fillText(`Rev ${rev.toFixed(1)}°`, size/2+28, ly);
}

/* Enter key triggers calculate, and sanitize coordinate field input live */
document.querySelectorAll('#lat1, #lon1, #lat2, #lon2').forEach(el => {
  el.addEventListener('keydown', e => { if (e.key === 'Enter') { el.blur(); calculate(); } });
  el.addEventListener('input', () => {
    let v = el.value;
    // allow only digits, one leading minus, one decimal point
    v = v.replace(/[^0-9.\-]/g, '');
    v = v.replace(/(?!^)-/g, '');           // minus only at start
    const firstDot = v.indexOf('.');
    if (firstDot !== -1) {
      v = v.slice(0, firstDot + 1) + v.slice(firstDot + 1).replace(/\./g, '');
    }
    if (v !== el.value) el.value = v;
  });
});

initPinBanner();
</script>
</body>
</html>
